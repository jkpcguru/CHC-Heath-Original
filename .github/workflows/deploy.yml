name: Deploy WordPress Site

on:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.PRIVATE_KEY }}

      - name: Add host to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H 49u.3f0.myftpupload.com >> ~/.ssh/known_hosts

      - name: Test SSH connection
        run: |
          ssh -o StrictHostKeyChecking=yes git_deployer_81fab9972a_541212@49u.3f0.myftpupload.com "pwd && ls -la"

      - name: Deploy site
        run: |
          rsync -rvz \
            --omit-dir-times \
            --no-perms \
            --no-owner \
            --no-group \
            --exclude ".git" \
            --exclude ".github" \
            -e "ssh -o StrictHostKeyChecking=yes" \
            ./ \
            git_deployer_81fab9972a_541212@49u.3f0.myftpupload.com:/
