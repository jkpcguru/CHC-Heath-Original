name: Import from GoDaddy SSH

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  import:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

      - name: Add GoDaddy host to known_hosts
        run: |
          ssh-keyscan -H 49u.3f0.myftpupload.com >> ~/.ssh/known_hosts

      - name: Inspect remote directories
        run: |
          ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=yes \
            git_deployer_81fab9972a_541212@49u.3f0.myftpupload.com '
              echo "PWD:"
              pwd
              echo
              echo "HOME LIST:"
              ls -la
              echo
              echo "HTML LIST:"
              ls -la html || true
              echo
              echo "HTML TOP FILES:"
              find html -maxdepth 2 -type f | head -100 || true
            '

      - name: Pull files from GoDaddy into repo
        run: |
          rsync -rvz \
            --omit-dir-times \
            --no-perms \
            --no-owner \
            --no-group \
            --exclude ".git" \
            --exclude ".github" \
            -e "ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=yes" \
            git_deployer_81fab9972a_541212@49u.3f0.myftpupload.com:html/ \
            ./

      - name: Show imported files
        run: |
          pwd
          ls -la
          find . -maxdepth 3 -type f | sort | head -200

      - name: Commit and push imported files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "Import files from GoDaddy via SSH"
          git push
